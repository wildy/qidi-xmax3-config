#####################################################################
# Probe
#####################################################################
#!# Pay attention to this section and compare it with your stock backup config
# [probe]
# pin: ^!Toolhead:gpio21
# x_offset: 28
# y_offset: 4.4
# #z_offset: 1.549
# speed: 5
# samples: 3
# samples_result: average
# sample_retract_dist: 0.7
# samples_tolerance: 0.08
# samples_tolerance_retries: 3
#####################################################################

#####################################################################
# LOCAL: cartographer 
#####################################################################
[include cartographer.cfg]

#####################################################################
# Heated chamber
#####################################################################
[heater_generic chamber]
heater_pin: PB10
max_power:1.0
sensor_type:NTC 100K MGB18-104F39050L32
sensor_pin: PA1
control: watermark
max_delta: 0.5
min_temp:-100
max_temp:70

[verify_heater chamber]
max_error: 300
check_gain_time:480
hysteresis: 5
heating_gain: 1


########################################
# Filament runout sensor
########################################
[filament_switch_sensor filament]
switch_pin: !PC1
pause_on_runout: True
runout_gcode:
            M118 Filament run out!
event_delay: 3.0
pause_delay: 0.5


#####################################################################
# Fans
#####################################################################
## Part cooling fan 
# [fan_generic partfan]
# pin: Toolhead:gpio2
# max_power: 1.0
# cycle_time: 0.0100
# hardware_pwm: false
# kick_start_time: 0.200
# off_below: 0.08
# shutdown_speed: 0
[fan]
pin: Toolhead:gpio2
max_power: 1.0
cycle_time: 0.0100
hardware_pwm: false
kick_start_time: 0.200
off_below: 0.08
shutdown_speed: 0.0

## Big side radial turbo fan
[fan_generic sidefan]
pin: PA8
max_power: 1.0
cycle_time: 0.0100
hardware_pwm: false
kick_start_time: 0.250
off_below: 0.3
shutdown_speed: 0

## Activated charcoal blowing fan
[fan_generic filterfan]
pin: PC9
max_power: 1.0
cycle_time: 0.0100
hardware_pwm: false
kick_start_time: 0.200
off_below: 0.3
shutdown_speed: 0

## Cold end and toolhead housing fans
[heater_fan hotend_fan]
pin: Toolhead:gpio1
max_power: 1.0
shutdown_speed:1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0
off_below: 0

#!# Delete the next section if your stock backup config doesnt have it
# Toolhead cooling fan
[heater_fan hotend_fan2]
pin: Toolhead:gpio20
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0
off_below: 0

#!# Delete the next section if your stock backup config doesnt have it
## Controllable Mainboard cooling fan
[temperature_fan Mainboard_fan]
sensor_type: temperature_host 
pin: PC4        
max_power: 1.0  
cycle_time: 0.01
sensor_type: temperature_combined
sensor_list: temperature_sensor Mainboard_RK3328, temperature_sensor Mainboard_STM32F402
combination_method: max                                           # use the maximum reading of the sensors
maximum_deviation: 999.9                                          # we don't care about the difference in temperature
shutdown_speed: 0.0
kick_start_time: 0.4
off_below: 0.19
min_temp: 0
max_temp: 85.0  
target_temp: 42.0
min_speed: 0
max_speed: 1.0
control: pid
pid_deriv_time: 2.0
pid_Kp: 2.0
pid_Ki: 5.0
pid_Kd: 0.5


#####################################################################
# Light
#####################################################################
## caselight LEDs
[output_pin caselight]
pin: PC7
pwm: true
cycle_time: 0.0100
shutdown_value:0
value:1


#####################################################################
# Buzzer
#####################################################################
## Buzzer
[output_pin buzzer]
pin: PA2
pwm: false
shutdown_value:0
value:0

[output_pin sound]
pin: PA13
value:0


#####################################################################
# Power outage shutdown
#####################################################################
[output_pin pwc]
pin: PA3
pwm: False
value: 1
shutdown_value: 1


#####################################################################
# Drives
#####################################################################
[stepper_x]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB5
microsteps: 16
rotation_distance: 39.94
full_steps_per_rotation: 200 
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: -5
position_endstop: -5
position_max: 328
homing_speed: 50
homing_retract_dist: 0
homing_positive_dir: False
step_pulse_duration: 0.000002

[stepper_y]
step_pin: PC14
dir_pin: PC13
enable_pin: !PC15
microsteps: 16
rotation_distance: 39.96
full_steps_per_rotation: 200  
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: -7.5
position_endstop: -7.5
position_max: 326
homing_speed: 50
homing_retract_dist: 0
homing_positive_dir: False
step_pulse_duration: 0.000002

[stepper_z]
step_pin: PC10
dir_pin: PA15
enable_pin: !PC11
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_max: 322
position_min: -2
homing_speed: 12
homing_retract_dist: 0
second_homing_speed: 5
homing_positive_dir: false
step_pulse_duration: 0.000002


#####################################################################
# Steppers configuration
#####################################################################
[tmc2209 extruder]
uart_pin: Toolhead:gpio6
interpolate: True
run_current: 0.714             #!# Pay attention to this value and compare it with your stock backup config
# stealthchop_threshold: 0  # LOCAL: not needed with autotune

[tmc2209 stepper_x]
uart_pin: PD2
run_current: 1.07               #!# Pay attention to this value and compare it with your stock backup config
interpolate: True
#stealthchop_threshold: 0 # LOCAL: not needed with autotune
diag_pin: ^PB8
#driver_SGTHRS: 85 # LOCAL: not needed with autotune

[tmc2209 stepper_y]
uart_pin: PB9
run_current: 1.07              #!# Pay attention to this value and compare it with your stock backup config
interpolate: True
#stealthchop_threshold: 0 # LOCAL: not needed with autotune
diag_pin: ^PC0
#driver_SGTHRS: 85

[tmc2209 stepper_z]
uart_pin: PC5
run_current: 0.95              #!# Pay attention to this value and compare it with your stock backup config
interpolate: True
#stealthchop_threshold: 1200 # LOCAL: not needed with autotune

# LOCAL: TMC autotune
[autotune_tmc stepper_x]
motor: qidi-BJ42D29-28V07
sg4_thrs: 85 # Sensorless homing

[autotune_tmc stepper_y]
motor: qidi-BJ42D29-28V07
sg4_thrs: 85 # Sensorless homing

[autotune_tmc stepper_z]
motor: qidi-BJ42D29-22V08

[autotune_tmc extruder]
motor: qidi-BJY36D12-04V13

#####################################################################
# Screws tilt adjust
#####################################################################
[screws_tilt_adjust] 
horizontal_move_z: 5
screw_thread: CCW-M4
speed: 300

screw1: 8,32
screw1_name: front left screw
screw2: 264,32
screw2_name: front right screw
screw3: 264,286
screw3_name: rear right screw
screw4: 8,286
screw4_name: rear left screw

[safe_z_home]
home_xy_position: 162.5, 162.5 # This should be for the CENTRE OF YOUR BED.

